# VM deployment: use pre-built images from Docker Hub (no build).
# Set DOCKERHUB_USERNAME before running:
#   export DOCKERHUB_USERNAME=your-dockerhub-username
#   docker compose -f docker-compose.hub.yml pull
#   docker compose -f docker-compose.hub.yml up -d

services:
  mongo:
    image: mongo:7
    container_name: dd-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USERNAME}/dd-backend:latest
    container_name: dd-backend
    environment:
      MONGODB_URI: mongodb://mongo:27017/dd_db
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME}/dd-frontend:latest
    container_name: dd-frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: dd-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
