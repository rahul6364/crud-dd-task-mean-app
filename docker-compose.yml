services:
  mongo:
    image: mongo:7
    container_name: dd-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dd-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/dd_db
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dd-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
