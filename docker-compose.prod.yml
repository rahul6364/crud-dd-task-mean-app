# Production / VM: single entry on port 80 via Nginx reverse proxy
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  mongo:
    image: mongo:7
    container_name: dd-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dd-backend
    container_name: dd-backend
    environment:
      MONGODB_URI: mongodb://mongo:27017/dd_db
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dd-frontend
    container_name: dd-frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: dd-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
